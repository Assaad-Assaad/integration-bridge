spring.application.name=integration-bridge


# RabbitMQ connection
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASS}

# Odoo config
odoo.url=${ODOO_URL}
odoo.db=${ODOO_DB}
odoo.userId=${ODOO_USER_ID}
odoo.apiKey=${ODOO_API_KEY}

# FossBilling config
fossbilling.url=${FOSSBILLING_URL}
fossbilling.apiKey=${FOSSBILLING_API_KEY}

# SendGrid config
sendgrid.apiKey=${SENDGRID_API_KEY}
sendgrid.fromEmail=${SENDGRID_FROM_EMAIL}
