version: '3.8'
services:
  # --- RabbitMQ (Message Broker) ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "30000:5672"
      - "30001:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    restart: unless-stopped

  # --- Odoo POS + its database ---
  odoo-db:
    image: postgres:15
    container_name: odoo-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo123
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  odoo:
    image: odoo:17
    container_name: odoo
    ports:
      - "30002:8069"
    environment:
      HOST: odoo-db
      USER: odoo
      PASSWORD: odoo123
    depends_on:
      - odoo-db
    volumes:
      - odoo-data:/var/lib/odoo
    restart: unless-stopped

  # --- FossBilling + its database ---
  fossbilling-db:
    image: mysql:8
    container_name: fossbilling-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: fossbilling
      MYSQL_USER: fossbilling
      MYSQL_PASSWORD: fossbilling123
    volumes:
      - fossbilling-db-data:/var/lib/mysql
    restart: unless-stopped

  fossbilling:
    image: fossbilling/fossbilling
    container_name: fossbilling
    ports:
      - "30003:80"
    depends_on:
      - fossbilling-db
    volumes:
      - fossbilling-data:/var/www/html
    restart: unless-stopped

  # --- Integration bridge project ----
  integration-bridge:
    build:
      context: /home/ehbstudent/integration-bridge
      dockerfile: Dockerfile
    container_name: integration-bridge
    depends_on:
      - rabbitmq
      - odoo
      - fossbilling
    environment:
      # RabbitMQ — talks to the rabbitmq service by name, internal port
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin123

      # Odoo — internal service name + internal port
      ODOO_URL: http://odoo:8069
      ODOO_DB: integration-group1
      ODOO_USER_ID: 2
      ODOO_API_KEY: 9ffbfd7b980bc05ccb1431ae4a866f82d39e4e0d

      # FossBilling
      FOSSBILLING_URL: http://fossbilling:80
      FOSSBILLING_API_KEY: your-fossbilling-api-key

      # SendGrid
      SENDGRID_API_KEY: your-sendgrid-api-key
      SENDGRID_FROM_EMAIL: noreply@example.com

      # Firebase — points to the mounted credentials file
      FIREBASE_CREDENTIALS_PATH: file:/app/firebase-key.json
    volumes:
      # Mount the credentials file from the VM filesystem into the container
      - /home/ehbstudent/integration-bridge/firebase-key.json:/app/firebase-key.json:ro
    restart: unless-stopped

volumes:
  odoo-db-data:
  odoo-data:
  fossbilling-data:
  fossbilling-db-data:
